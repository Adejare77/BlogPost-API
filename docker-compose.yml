services:
  postgres_db:
    image: postgres:17
    environment:
      - POSTGRES_DB=test_db
      - POSTGRES_USER=docker_user
      - POSTGRES_PASSWORD=docker_pass
    volumes:
      - my_data:/var/lib/postgresql/data
    ports:
      - 5433:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docker_user -d test_db"]
      interval: 10s
      timeout: 5s
      retries: 3
      # start_period: 30s

  web:
    image: blogpost-api:v2.0.1
    env_file:
      - .env
    ports:
      - 3000:8000
    environment:
      - DATABASE_URL=postgres://docker_user:docker_pass@postgres_db:5432/test_db
    command: sh -c "python3 manage.py migrate && gunicorn blogPost.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    depends_on:
      postgres_db:
        condition: service_healthy
    healthcheck:
      test: ["executable", "arg"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s

volumes:
  my_data:
