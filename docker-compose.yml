services:
  postgres_db:
    image: postgres:17
    environment:
      - POSTGRES_DB=test_db
      - POSTGRES_USER=docker_user
      - POSTGRES_PASSWORD=docker_pass
    volumes:
      - my_data:/var/lib/postgresql/data
    ports:
      - 5433:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docker_user -d test_db"]
      interval: 20s
      timeout: 5s
      retries: 3
      # start_period: 30s

  redis:
    image: redis:8.6.0
    ports:
      - 6379:6379
  web:
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    secrets:
      - prometheus_scrape_token
    volumes:
      - .:/app
    env_file:
      - .env
    ports:
      - 3000:8000
    environment:
      - DATABASE_URL=postgres://docker_user:docker_pass@postgres_db:5432/test_db
      - PROMETHEUS_SCRAPE_TOKEN_FILE=/run/secrets/prometheus_scrape_token

    command: ["./entrypoint.sh"]
    depends_on:
      postgres_db:
        condition: service_healthy
      redis:
        condition: service_started

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  my_data:

secrets:
  prometheus_scrape_token:
    file: ./secrets/prom_token
